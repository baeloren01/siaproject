<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bea's Corner</title>
<style>
body{
    background: linear-gradient(135deg, #ffcce7, #ffd6f0);
    font-family: 'Arial', sans-serif;
    color: #4d1a3a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    margin: 0;
}

.container{
    position: relative;
    display: flex;
    align-items: center;
}

.character{
    width: 200px;
    position: absolute;
    left: -180px;
    bottom: -10px;
    transition: transform 0.3s;
}
.character:hover{
    transform: scale(1.05) rotate(-5deg);
}

.card{
    background: rgba(255, 255, 255, 0.25);
    backdrop-filter: blur(15px);
    border-radius: 25px;
    padding: 30px;
    width: 380px;
    box-shadow: 0 0 30px rgba(255, 192, 203, 0.4);
    transition: transform 0.3s, box-shadow 0.3s;
}
.card:hover{
    transform: translateY(-5px);
    box-shadow: 0 0 40px rgba(255, 182, 193, 0.6);
}

h2{
    margin: 0;
    font-family: 'Comic Sans MS', cursive, sans-serif;
}

span{
    color: #ff6699;
}

.menu{
    display: grid;
    grid-template-columns: repeat(2,1fr);
    gap: 15px;
    margin-top: 20px;
}

.menu-item{
    background: rgba(255, 255, 255, 0.2);
    border-radius: 15px;
    padding: 12px;
    text-align: center;
    cursor: pointer;
    transition: 0.3s;
    color: #4d1a3a;
    font-weight: bold;
}
.menu-item:hover{
    background: #ffb6c1;
    transform: scale(1.1);
    color: #fff;
    box-shadow: 0 4px 15px rgba(255, 182, 193, 0.5);
}

.menu-item p{
    margin: 5px 0 0 0;
    font-size: 14px;
}

.content{
    margin-top: 20px;
    background: rgba(255, 182, 193, 0.25);
    padding: 15px;
    border-radius: 15px;
    min-height: 80px;
    font-size: 14px;
    color: #4d1a3a;
    box-shadow: 0 2px 10px rgba(255, 182, 193, 0.4);
}

.madeby{
    margin-top: 15px;
    font-size: 12px;
    text-align: center;
    color: #7a3b63;
    opacity: 0.8;
}
</style>
</head>

<body>

<div class="container">

    <img class="character" src="download-removebg-preview.png" alt="Bea Character">

    <div class="card">

        <h2>Hi! I'm <span>Bea</span></h2>
        <p>Welcome to my corner. Do you wanna know something about me?</p>

        <div class="menu">

            <div class="menu-item" onclick="showContent('about')">
                🐱
                <p>about</p>
            </div>

            <div class="menu-item" onclick="showContent('creations')">
                🎨
                <p>creations</p>
            </div>

            <div class="menu-item" onclick="showContent('links')">
                🔗
                <p>links</p>
            </div>

            <div class="menu-item" onclick="showContent('stuff')">
                ✨
                <p>stuff</p>
            </div>

        </div>

        <div id="contentBox" class="content">
            Click an icon above ✦
        </div>

        <div class="madeby">
             Made by: Bea Loren Dalen
        </div>

    </div>

</div>

<script>
function showContent(section){
    let box = document.getElementById("contentBox");

    if(section==="about"){
        box.innerHTML = `
        <h3>About Me</h3>
        <p>Hello! I'm Bea. I enjoy editing graphics, drawing and sketching, and writing. 
I love cats, cute pink stuffs and creative things. Most of the time you’ll find me sleeping, eating, 
watching movies or BL dramas. I sometimes code when I’m bored eme, but I mainly enjoy creating 
visual and artistic things, depende if being productive hits me heh.</p>
        `;
    }

    if(section==="creations"){
        box.innerHTML = `
        <h3>My Creations & Skills</h3>
        <p>🎨 Editing graphics and videos</p>
        <p>🖌️ Digital art and sketches</p>
        <p>💻 Learning HTML, CSS, and JS</p>
        <p>✨ Fun personal creative projects</p>
        `;
    }

    if(section==="links"){
        box.innerHTML = `
        <h3>My Links</h3>
        <p>Instagram: @baeczz </p>
        <p>Facebook: Bea Loren </p>
        <p>Github: github.com/baeloren01</p>  
        `;
    }

    if(section==="stuff"){
        box.innerHTML = `
        <h3>Stuff I Love</h3>
        <p>🐱 Cats</p>
        <p>🎧 Music</p>
        <p>🎨 Drawing</p>
        <p>🎮 Playing CODM & Valorant</p>
        <p>😶‍🌫️ Isolate </p> 
        `;
    }
}
</script>

</body>
</html>
